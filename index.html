<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Corres - AR-Tronic</title>
    <style>
        /* 🛡️ Estilo da tela de login */
        #telaLogin {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            font-family: Arial, sans-serif;
        }
        #telaLogin h2 { margin-bottom: 15px; color: #222; }
        #telaLogin input {
            padding: 8px 10px; width: 220px; margin-bottom: 12px;
            border: 1px solid #ccc; border-radius: 3px; font-size: 15px;
        }
        #telaLogin button {
            padding: 7px 18px; background: #333; color: #fff;
            border: none; border-radius: 3px; cursor: pointer;
        }
        #msgErro { margin-top: 10px; color: #c00; display: none; }

        /* 📋 Sistema principal */
        #sistema {
            display: none; padding: 15px; font-family: Arial, sans-serif;
        }
        .acao-btn {
            padding: 4px 8px; margin: 0 4px; border: none; border-radius: 3px;
            cursor: pointer; font-size: 13px;
        }
        .editar { background-color: #2196F3; color: white; }
        .excluir { background-color: #f44336; color: white; }
    </style>
</head>
<body>

<!-- 🛡️ Tela de Login -->
<div id="telaLogin">
    <h2>Acesso ao sistema de Entregas/Retirada AR Tronic</h2>
    <input type="password" id="senha" placeholder="Digite a senha">
    <button onclick="entrar()">Acessar</button>
    <div id="msgErro">Senha incorreta!</div>
</div>

<!-- 📋 Sistema Principal -->
<div id="sistema">
    <h1>🚚 Meus Corres</h1>
    <p><a href="#" onclick="mostrarForm()">Cadastrar Novo Corre</a></p>
    <p><a href="#" onclick="carregarLista()">Lista das Correrias</a></p>

    <table border="1" cellpadding="6" cellspacing="0" width="100%">
        <thead>
            <tr>
                <th>Data</th>
                <th>Lugar da Entrega / Retirada</th>
                <th>Descrição do que fazer</th>
                <th>Valor do corre R$</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <tr><td colspan="5" align="center">Nenhuma entrega cadastrada</td></tr>
        </tbody>
    </table>

    <p style="margin-top:15px; font-weight:bold;">No fim do dia tu me deve : R$ <span id="total">0,00</span></p>

    <!-- Formulário de Cadastro / Edição -->
    <div id="formCadastro" style="margin-top:20px; display:none; border:1px solid #ccc; padding:15px;">
        <h3 id="tituloForm">Cadastrar Novo Corre</h3>
        <input type="hidden" id="idRegistro">
        <label>Data:</label><br>
        <input type="date" id="data"><br><br>
        <label>Lugar da Entrega / Retirada:</label><br>
        <input type="text" id="local"><br><br>
        <label>Descrição do que fazer:</label><br>
        <input type="text" id="servico"><br><br>
        <label>Valor do corre R$:</label><br>
        <input type="number" step="0.01" min="0" id="valor"><br><br>
        <button onclick="salvar()">Salvar</button>
        <button onclick="fecharForm()">Cancelar</button>
    </div>

    <br>
    <button onclick="sair()">Sair</button>
</div>

<!-- 🔌 Bibliotecas Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// 🔑 Configuração do Firebase
const firebaseConfig = {
  apiKey: "AIzaSyB7ZDk7iGS_JgHIaShNtblePwBTIfTq0ws",
  authDomain: "contoleentregas.firebaseapp.com",
  databaseURL: "https://contoleentregas-default-rtdb.firebaseio.com/",
  projectId: "contoleentregas",
  storageBucket: "contoleentregas.appspot.com",
  messagingSenderId: "321723616016",
  appId: "1:321723616016:web:33d47e8e6e718770d83395"
};

firebase.initializeApp(firebaseConfig);
const banco = firebase.database().ref('entregas');
const SENHA = "entrega123";

// 🛡️ Funções de Login
function entrar() {
    const senha = document.getElementById("senha").value.trim();
    if (senha === SENHA) {
        document.getElementById("telaLogin").style.display = "none";
        document.getElementById("sistema").style.display = "block";
        localStorage.setItem("logado", "sim");
        carregarLista();
    } else {
        document.getElementById("msgErro").style.display = "block";
    }
}

function sair() {
    localStorage.removeItem("logado");
    document.getElementById("sistema").style.display = "none";
    document.getElementById("telaLogin").style.display = "flex";
    document.getElementById("senha").value = "";
}

// 📋 Funções do Sistema
function mostrarForm() {
    document.getElementById("tituloForm").textContent = "Cadastrar Novo Corre";
    document.getElementById("idRegistro").value = "";
    document.getElementById("data").value = "";
    document.getElementById("local").value = "";
    document.getElementById("servico").value = "";
    document.getElementById("valor").value = "";
    document.getElementById("formCadastro").style.display = "block";
}

function fecharForm() {
    document.getElementById("formCadastro").style.display = "none";
}

function salvar() {
    const id = document.getElementById("idRegistro").value;
    const dados = {
        data: document.getElementById("data").value,
        local: document.getElementById("local").value,
        servico: document.getElementById("servico").value,
        valor: Number(document.getElementById("valor").value)
    };

    if (!dados.data || !dados.local || !dados.servico || isNaN(dados.valor)) {
        alert("Preencha todos os campos corretamente!");
        return;
    }

    if (id) {
        // Atualizar registro existente
        banco.child(id).update(dados)
            .then(() => {
                alert("Registro atualizado!");
                fecharForm();
                carregarLista();
            })
            .catch(err => alert("Erro: " + err));
    } else {
        // Criar novo registro
        banco.push(dados)
            .then(() => {
                alert("Cadastrado com sucesso!");
                fecharForm();
                carregarLista();
            })
            .catch(err => alert("Erro: " + err));
    }
}

function carregarLista() {
    banco.once("value")
        .then(snapshot => {
            const corpo = document.getElementById("corpoTabela");
            corpo.innerHTML = "";
            let total = 0;

            if (!snapshot.exists()) {
                corpo.innerHTML = `<tr><td colspan="5" align="center">Nenhuma entrega cadastrada</td></tr>`;
                document.getElementById("total").textContent = "0,00";
                return;
            }

            snapshot.forEach(item => {
                const id = item.key;
                const d = item.val();
                total += d.valor;

                corpo.innerHTML += `
                    <tr>
                        <td>${d.data || ""}</td>
                        <td>${d.local || ""}</td>
                        <td>${d.servico || ""}</td>
                        <td>R$ ${d.valor.toFixed(2).replace(".", ",")}</td>
                        <td>
                            <button class="acao-btn editar" onclick="editar('${id}', '${d.data}', '${d.local}', '${d.servico}', ${d.valor})">Editar</button>
                            <button class="acao-btn excluir" onclick="excluir('${id}')">Excluir</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById("total").textContent = total.toFixed(2).replace(".", ",");
        });
}

function editar(id, data, local, servico, valor) {
    document.getElementById("tituloForm").textContent = "Editar Corre";
    document.getElementById("idRegistro").value = id;
    document.getElementById("data").value = data;
    document.getElementById("local").value = local;
    document.getElementById("servico").value = servico;
    document.getElementById("valor").value = valor;
    document.getElementById("formCadastro").style.display = "block";
}

function excluir(id) {
    if (confirm("Tem certeza que deseja excluir este registro?")) {
        banco.child(id).remove()
            .then(() => carregarLista())
            .catch(err => alert("Erro ao excluir: " + err));
    }
}

// ✅ Manter sessão logada
if (localStorage.getItem("logado") === "sim") {
    document.getElementById("telaLogin").style.display = "none";
    document.getElementById("sistema").style.display = "block";
    carregarLista();
}

document.getElementById("senha").addEventListener("keypress", e => {
    if (e.key === "Enter") entrar();
});
</script>

</body>
</html>
